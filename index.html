<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>योजना सहायक — जानिए आपको कौन सी सरकारी योजना मिल सकती है</title>
<meta name="description" content="5 आसान सवालों के जवाब दें और जानें कि आप किन सरकारी योजनाओं के हकदार हैं — PM-Kisan, आयुष्मान भारत, पेंशन, छात्रवृत्ति और बहुत कुछ। मुफ्त, बिना लॉगिन।">
<style>
  :root{--saffron:#e87722;--green:#1a7f37;--blue:#1c4fa0;--bg:#faf7f2;--card:#ffffff;--text:#26221c;--muted:#6f675c;--border:#e5ddd0;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,'Noto Sans Devanagari',sans-serif;font-size:18px;line-height:1.5;min-height:100vh}
  .wrap{max-width:640px;margin:0 auto;padding:16px 14px 60px}
  header{display:flex;align-items:center;gap:10px;padding:6px 0 2px}
  .logo{font-size:34px}
  h1{font-size:24px;color:var(--blue)}
  .sub{color:var(--muted);font-size:15px;margin:2px 0 14px}
  .langbtn{margin-left:auto;background:var(--card);border:2px solid var(--blue);color:var(--blue);border-radius:24px;padding:7px 16px;font-size:16px;font-weight:700;cursor:pointer}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:14px}
  .qnum{color:var(--saffron);font-weight:700;font-size:14px;letter-spacing:1px}
  .qtext{font-size:22px;font-weight:700;margin:6px 0 16px}
  .opts{display:grid;gap:10px}
  .opt{display:block;width:100%;text-align:left;background:#fdfbf7;border:2px solid var(--border);border-radius:12px;padding:15px 16px;font-size:19px;cursor:pointer;font-family:inherit;transition:border-color .1s}
  .opt:active{background:#f3ecdf}
  .opt.sel{border-color:var(--green);background:#eef7ee;font-weight:700}
  .opt .em{font-size:22px;margin-right:10px}
  .progress{height:8px;background:var(--border);border-radius:4px;margin:10px 0 18px;overflow:hidden}
  .progress div{height:100%;background:linear-gradient(90deg,var(--saffron),var(--green));border-radius:4px;transition:width .3s}
  .nav{display:flex;gap:10px;margin-top:16px}
  .btn{flex:1;border:none;border-radius:12px;padding:16px;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-main{background:var(--green);color:#fff}
  .btn-back{background:#efe9de;color:var(--text);flex:0 0 auto;padding:16px 20px}
  .btn-main:disabled{background:#b8ccb8;cursor:default}
  .hint{font-size:14px;color:var(--muted);margin-top:8px}
  /* results */
  .rescount{font-size:20px;font-weight:700;margin:4px 0 14px}
  .scheme{border-left:6px solid var(--green)}
  .scheme h3{font-size:20px;color:var(--blue);margin-bottom:4px}
  .benefit{display:inline-block;background:#eef7ee;color:var(--green);font-weight:800;font-size:18px;border-radius:8px;padding:4px 12px;margin:6px 0}
  .scheme p{font-size:16px;margin:6px 0}
  .how{background:#fff8ef;border:1px solid #f3dfc0;border-radius:10px;padding:10px 12px;font-size:15.5px;margin-top:8px}
  .how b{color:var(--saffron)}
  .link{display:inline-block;margin-top:8px;background:var(--blue);color:#fff;text-decoration:none;border-radius:10px;padding:10px 16px;font-size:16px;font-weight:700}
  .helpline{font-size:15px;color:var(--muted);margin-top:6px}
  .disclaimer{font-size:13.5px;color:var(--muted);background:#f5f0e6;border-radius:10px;padding:12px;margin-top:16px}
  .restart{background:none;border:none;color:var(--blue);font-size:17px;font-weight:700;cursor:pointer;text-decoration:underline;margin-top:14px;font-family:inherit}
  footer{text-align:center;color:var(--muted);font-size:13px;margin-top:30px}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="logo">🇮🇳</span>
    <div><h1 id="title"></h1></div>
    <button class="langbtn" id="langbtn" onclick="toggleLang()"></button>
  </header>
  <p class="sub" id="subtitle"></p>

  <div id="quiz">
    <div class="progress"><div id="bar" style="width:0%"></div></div>
    <div class="card">
      <div class="qnum" id="qnum"></div>
      <div class="qtext" id="qtext"></div>
      <div class="opts" id="opts"></div>
      <div class="hint" id="qhint"></div>
      <div class="nav">
        <button class="btn btn-back" id="backbtn" onclick="back()">←</button>
        <button class="btn btn-main" id="nextbtn" onclick="next()"></button>
      </div>
    </div>
  </div>

  <div id="results" class="hidden">
    <div class="rescount" id="rescount"></div>
    <div id="schemelist"></div>
    <div class="disclaimer" id="disclaimer"></div>
    <button class="restart" onclick="restart()" id="restartbtn"></button>
  </div>

  <footer id="footer"></footer>
</div>

let step=0; const ans={house:[]};

function t(){return T[lang]}
function toggleLang(){lang=lang==='hi'?'en':'hi';renderChrome();showStep()}
function renderChrome(){
  document.getElementById('title').textContent=t().title;
  document.getElementById('subtitle').textContent=t().subtitle;
  document.getElementById('langbtn').textContent=t().lang;
  document.getElementById('footer').textContent=t().footer;
  document.documentElement.lang=lang;
}
function showStep(){
  if(step>=QS.length){showResults();return}
  document.getElementById('quiz').classList.remove('hidden');
  document.getElementById('results').classList.add('hidden');
  const q=QS[step];
  document.getElementById('bar').style.width=(step/QS.length*100)+'%';
  document.getElementById('qnum').textContent=t().q+' '+(step+1)+' '+t().of+' '+QS.length;
  document.getElementById('qtext').textContent=q[lang];
  document.getElementById('qhint').textContent=q.multi?t().multi:'';
  document.getElementById('backbtn').style.visibility=step===0?'hidden':'visible';
  const nb=document.getElementById('nextbtn');
  nb.textContent=step===QS.length-1?t().showres:t().next;
  const box=document.getElementById('opts');box.innerHTML='';
  q.opts.forEach(o=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML='<span class="em">'+o.em+'</span>'+o[lang];
    const sel=q.multi?ans.house.includes(o.v):ans[q.id]===o.v;
    if(sel)b.classList.add('sel');
    b.onclick=()=>{
      if(q.multi){
        if(o.v==='none'){ans.house=['none']}
        else{ans.house=ans.house.filter(x=>x!=='none');
          ans.house.includes(o.v)?ans.house=ans.house.filter(x=>x!==o.v):ans.house.push(o.v)}
      }else{ans[q.id]=o.v;setTimeout(next,200)}
      showStep();
    };
    box.appendChild(b);
  });
  nb.disabled=q.multi?ans.house.length===0:!ans[q.id];
}
function next(){
  const q=QS[step];
  if(q.multi?ans.house.length===0:!ans[q.id])return;
  step++;showStep();
}
function back(){if(step>0){step--;showStep()}}
function restart(){step=0;ans.age=ans.gender=ans.work=ans.tax=undefined;ans.house=[];showStep()}

function showResults(){
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('results').classList.remove('hidden');
  document.getElementById('bar').style.width='100%';
  const matched=SCHEMES.filter(s=>{try{return s.m(ans)}catch(e){return false}});
  document.getElementById('rescount').textContent='✅ '+t().resfor+' '+matched.length+' '+t().schemes;
  document.getElementById('schemelist').innerHTML=matched.map(s=>{
    const L=s[lang];
    return `<div class="card scheme">
      <h3>${L.n}</h3>
      <div class="benefit">💰 ${L.b}</div>
      <p>${L.d}</p>
      <div class="how"><b>📍 ${t().how}</b> ${L.h}</div>
      <a class="link" href="${s.url}" target="_blank" rel="noopener">🔗 ${t().site}</a>
      <div class="helpline">📞 ${t().helpline}: <b>${s.tel}</b></div>
    </div>`;
  }).join('');
  document.getElementById('disclaimer').textContent=t().disclaimer;
  document.getElementById('restartbtn').textContent=t().restart;
  window.scrollTo(0,0);
}
renderChrome();showStep();
</script>
